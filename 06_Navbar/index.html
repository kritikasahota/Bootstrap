<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap Navbar Notes</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
<!--====================================================
                    BOOTSTRAP NAVBAR NOTES
======================================================-->

<!--
Definition:
A Navbar is a responsive navigation header used to display links, logos, search bars, buttons, dropdowns, and other navigation elements.

Basic Syntax
<nav class="navbar">
    ...
</nav>
-->

<!--====================================================
                1. BASIC NAVBAR
======================================================-->

<!--

navbar
-------
Creates a Bootstrap navigation bar.

navbar-expand-lg
----------------
Navbar stays collapsed on small devices.
Expands (horizontal) on large screens and above.

Expand Breakpoints:
navbar-expand-sm
navbar-expand-md
navbar-expand-lg
navbar-expand-xl
navbar-expand-xxl
-->

    <nav class="navbar navbar-expand-lg bg-primary navbar-dark">
      <div class="container-fluid">
        <!-- Website Logo / Brand -->

        <!--
        navbar-brand
        -------------
        Used for website name or logo.
        -->

        <a class="navbar-brand" href="#"> MyWebsite </a>

        <!--====================================================
                    TOGGLER BUTTON
        ======================================================-->

        <!--

        navbar-toggler
        --------------
        Creates hamburger menu.

        data-bs-toggle="collapse"
        -------------------------
        Enables collapse functionality.

        data-bs-target="#navbarMenu"
        ----------------------------
        Connects button with collapsible menu.

        navbar-toggler-icon
        -------------------
        Displays hamburger icon.

        -->

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarMenu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <!--====================================================
                    COLLAPSIBLE MENU
        ======================================================-->

        <!--

        collapse
        --------
        Hides content initially.

        navbar-collapse
        ---------------
        Makes menu collapsible.

        -->

        <div class="collapse navbar-collapse" id="navbarMenu">
          <!--

            navbar-nav
            ----------
            Holds navigation links.

            me-auto
            -------
            Pushes remaining items to the right.

            -->

          <ul class="navbar-nav me-auto">
            <!--

                nav-item
                --------
                Wrapper for each navigation item.

                nav-link
                --------
                Creates navigation links.

                active
                ------
                Highlights current page.

                -->

            <li class="nav-item">
              <a class="nav-link active" href="#"> Home </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#"> About </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#"> Services </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#"> Contact </a>
            </li>
          </ul>

          <!--====================================================
                        SEARCH FORM
            ======================================================-->

          <!--

            d-flex
            ------
            Makes form items display in a row.

            form-control
            ------------
            Bootstrap styled input.

            btn
            ---
            Bootstrap button.

            -->

          <form class="d-flex">
            <input
              class="form-control me-2"
              type="search"
              placeholder="Search"
            />

            <button class="btn btn-warning">Search</button>
          </form>
        </div>
      </div>
    </nav>

    <!--====================================================
            2. NAVBAR WITH DROPDOWN
    ======================================================-->

    <div class="container mt-5">
      <h2>Navbar Dropdown Example</h2>

      <nav class="navbar navbar-expand-lg bg-dark navbar-dark rounded mt-3">
        <div class="container-fluid">
          <a class="navbar-brand" href="#"> Shop </a>

          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#menu2"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="menu2">
            <ul class="navbar-nav me-auto">
              <li class="nav-item">
                <a class="nav-link active" href="#"> Home </a>
              </li>

              <li class="nav-item dropdown">
                <a
                  class="nav-link dropdown-toggle"
                  href="#"
                  data-bs-toggle="dropdown"
                >
                  Products
                </a>

                <ul class="dropdown-menu">
                  <li>
                    <a class="dropdown-item" href="#"> Mobiles </a>
                  </li>

                  <li>
                    <a class="dropdown-item" href="#"> Laptops </a>
                  </li>

                  <li>
                    <a class="dropdown-item" href="#"> Accessories </a>
                  </li>
                </ul>
              </li>

              <li class="nav-item">
                <a class="nav-link" href="#"> Contact </a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
