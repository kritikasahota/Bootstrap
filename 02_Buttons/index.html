<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Makes the webpage responsive on all devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bootstrap Buttons</title>

    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- ==========================================================
                    BOOTSTRAP BUTTONS
==============================================================

Definition:
Bootstrap provides pre-designed button classes that help
create attractive, responsive, and consistent buttons
without writing custom CSS.

Syntax:

<button class="btn btn-primary">Button</button>

Explanation:

btn            -> Base button class (Mandatory)
btn-primary    -> Color variant

Without "btn", Bootstrap button styling will not work.

============================================================== -->


<!-- ==========================================================
                    1. Solid Buttons
============================================================== -->

<!--
btn-primary   -> Blue
btn-secondary -> Gray
btn-success   -> Green
btn-danger    -> Red
btn-warning   -> Yellow
btn-info      -> Cyan
btn-light     -> White
btn-dark      -> Black
-->

<div class="container mt-4">

    <h2>1. Solid Buttons</h2>

    <button class="btn btn-primary">Primary</button>

    <button class="btn btn-secondary">Secondary</button>

    <button class="btn btn-success">Success</button>

    <button class="btn btn-danger">Danger</button>

    <button class="btn btn-warning">Warning</button>

    <button class="btn btn-info">Info</button>

    <button class="btn btn-light">Light</button>

    <button class="btn btn-dark">Dark</button>

</div>


<!-- ==========================================================
                2. Outline Buttons
============================================================== -->

<!--
Outline buttons have only border color.
Background appears on hover.
-->

<div class="container mt-5">

    <h2>2. Outline Buttons</h2>

    <button class="btn btn-outline-primary">Primary</button>

    <button class="btn btn-outline-success">Success</button>

    <button class="btn btn-outline-danger">Danger</button>

    <button class="btn btn-outline-warning">Warning</button>

</div>


<!-- ==========================================================
                    3. Button Sizes
============================================================== -->

<!--

btn-lg     -> Large Button

(Default)  -> Medium Button

btn-sm     -> Small Button

-->

<div class="container mt-5">

    <h2>3. Button Sizes</h2>

    <button class="btn btn-primary btn-lg">
        Large Button
    </button>

    <button class="btn btn-success">
        Default Button
    </button>

    <button class="btn btn-danger btn-sm">
        Small Button
    </button>

</div>


<!-- ==========================================================
                    4. Disabled Button
============================================================== -->

<!--

disabled attribute

✔ Prevents user interaction.

✔ Button becomes inactive.

-->

<div class="container mt-5">

    <h2>4. Disabled Button</h2>

    <button class="btn btn-secondary" disabled>
        Disabled Button
    </button>

</div>


<!-- ==========================================================
                5. Anchor Tag as Button
============================================================== -->

<!--

Bootstrap can style links as buttons.

Useful for navigation.

-->

<div class="container mt-5">

    <h2>5. Link Button</h2>

    <a href="#" class="btn btn-dark">
        Visit Website
    </a>

</div>


<!-- ==========================================================
                    Button Classes
==============================================================

Base Class :- btn

Color Classes :-

btn-primary
btn-secondary
btn-success
btn-danger
btn-warning
btn-info
btn-light
btn-dark

Outline Classes:-

btn-outline-primary
btn-outline-success
btn-outline-danger
btn-outline-warning
btn-outline-info
btn-outline-dark

Size Classes:-

btn-lg
btn-sm

State:-

disabled

</body>
</html>
