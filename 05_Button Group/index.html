<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Button Group Notes</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

    <!--====================================================
                    BUTTON GROUP NOTES
    ======================================================-->

    <!--
    Definition:
    A Button Group is used to combine multiple related buttons into a single horizontal or vertical group.

    Syntax:
    <div class="btn-group">
        <button class="btn btn-primary">Button 1</button>
        <button class="btn btn-primary">Button 2</button>
    </div>
    -->

    <h2 class="mb-4">1. Basic Button Group</h2>

    <!--
    btn-group
    ------------
    Creates a horizontal button group.

    role="group"
    ------------
    Improves accessibility for screen readers.
    -->

    <div class="btn-group mb-5" role="group">
        <button class="btn btn-primary">Home</button>
        <button class="btn btn-primary">About</button>
        <button class="btn btn-primary">Services</button>
        <button class="btn btn-primary">Contact</button>

    </div>

    <h2 class="mb-4">2. Mixed Button Colors</h2>
    <div class="btn-group mb-5" role="group">
        <button class="btn btn-success">Save</button>
        <button class="btn btn-warning">
            Edit
        </button>
        <button class="btn btn-danger">
            Delete
        </button>
    </div>

    <h2 class="mb-4">3. Large Button Group</h2>
    <div class="btn-group btn-group-lg mb-5" role="group">
        <button class="btn btn-dark">Previous</button>
        <button class="btn btn-secondary">Next</button>
    </div>

    <h2 class="mb-4">4. Small Button Group</h2>
    <div class="btn-group btn-group-sm mb-5" role="group">
        <button class="btn btn-info">Yes</button>
        <button class="btn btn-info">No</button>
    </div>

    <h2 class="mb-4">5. Vertical Button Group</h2>

    <!-- btn-group-vertical Displays buttons from top to bottom instead of left to right. -->

    <div class="btn-group-vertical mb-5" role="group">
        <button class="btn btn-primary">
            Dashboard
        </button>
        <button class="btn btn-primary">
            Users
        </button>
        <button class="btn btn-primary">
            Reports
        </button>
        <button class="btn btn-primary">
            Settings
        </button>
    </div>

    <h2 class="mb-4">6. Button Group with Dropdown</h2>

    <!--
    dropdown-toggle

    Adds dropdown functionality.

    dropdown-toggle-split

    Creates only the dropdown arrow.

    data-bs-toggle="dropdown"

    Activates Bootstrap dropdown.

    dropdown-menu

    Container of dropdown items.

    dropdown-item

    Individual dropdown option.
    -->

    <div class="btn-group mb-5">
        <button class="btn btn-success">
            Profile
        </button>
        <button
            class="btn btn-success dropdown-toggle dropdown-toggle-split"
            data-bs-toggle="dropdown">
        </button>
        <ul class="dropdown-menu">
            <li>
                <a class="dropdown-item" href="#">
                    My Account
                </a>
            </li>
            <li>
                <a class="dropdown-item" href="#">
                    Settings
                </a>
            </li>
            <li>
                <a class="dropdown-item" href="#">
                    Logout
                </a>
            </li>
        </ul>
    </div>

    <!-- Bootstrap JS (Required for dropdowns) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
